name: Run Analysis Script

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  ANALYSIS_SCRIPT: scripts/post_risk_unlock_audit.py  # An jeweiliges Skript anpassen
    
jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify analysis script exists
        run: |
          test -f "${ANALYSIS_SCRIPT}"

      - name: Run analysis script
        run: |
          python "${ANALYSIS_SCRIPT}"

      - name: Show generated files
        run: |
          echo "PWD=$(pwd)"
          echo "Top-level:"
          ls -la
          echo ""
          echo "reports:"
          ls -la reports || true
          echo ""
          echo "reports/analysis:"
          ls -la reports/analysis || true
          echo ""
          echo "git status:"
          git status --short

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-output
          path: reports/analysis/**
          if-no-files-found: error

      - name: Commit generated analysis artifacts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add -A reports/analysis/

          echo "git status after add:"
          git status --short

          git diff --cached --quiet || git commit -m "Run analysis script: ${ANALYSIS_SCRIPT}"
          git push
