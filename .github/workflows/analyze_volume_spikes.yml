name: Analyze Breakout Volume Spikes

on:
  workflow_dispatch:
    inputs:
      min_date:
        description: 'Nur Snapshots ab diesem Datum (YYYY-MM-DD), leer = alle'
        required: false
        default: ''

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run volume spike analysis
        run: |
          if [ -n "${{ github.event.inputs.min_date }}" ]; then
            python analyze_volume_spikes.py \
              --snapshots-dir snapshots/history \
              --min-date "${{ github.event.inputs.min_date }}"
          else
            python analyze_volume_spikes.py \
              --snapshots-dir snapshots/history
          fi

      - name: Save output as artifact
        if: always()
        run: |
          if [ -n "${{ github.event.inputs.min_date }}" ]; then
            python analyze_volume_spikes.py \
              --snapshots-dir snapshots/history \
              --min-date "${{ github.event.inputs.min_date }}" \
              > volume_spike_analysis.txt 2>&1
          else
            python analyze_volume_spikes.py \
              --snapshots-dir snapshots/history \
              > volume_spike_analysis.txt 2>&1
          fi

      - name: Upload analysis result
        uses: actions/upload-artifact@v4
        with:
          name: volume-spike-analysis
          path: volume_spike_analysis.txt
          retention-days: 30
